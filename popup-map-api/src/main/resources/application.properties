spring.application.name=popup-map-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/popup_map}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.flyway.enabled=true

app.security.admin.jwt-secret=${ADMIN_JWT_SECRET:local-dev-admin-jwt-secret-change-me}
app.security.admin.expires-in=${ADMIN_TOKEN_EXPIRES_IN:3600}
